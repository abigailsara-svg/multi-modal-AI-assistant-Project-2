<!DOCTYPE html>
<html>
<head>
    <title>Multi-Modal AI Assistant</title>
</head>
<body>

    <h1>Multi-Modal AI Assistant</h1>

        <input type="file" name="image">

        <button type="submit">Submit</button>

    </form>

    <h3>{{ response }}</h3>

</body>
</html>
